<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PocketSense AI - Login</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .auth-card {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
    }
  </style>
</head>
<body>
  
  <div class="card auth-card">
    <div style="text-align: center; margin-bottom: 2rem;">
      <div class="logo justify-center mb-2">
        <span class="text-gradient">PocketSense AI</span>
      </div>
      <h2 class="text-2xl">Welcome Back</h2>
      <p class="text-secondary text-sm">Sign in to continue analyzing your finances.</p>
    </div>

    <form id="loginForm">
      <div id="loginAlert" style="display:none; padding: 0.75rem; background: rgba(220, 38, 38, 0.1); border: 1px solid var(--accent-danger); border-radius: var(--radius-sm); margin-bottom: 1rem; color: var(--accent-danger); font-size: 0.875rem;">
        Error message
      </div>
      
      <div class="form-group mb-4">
        <label class="form-label">EMAIL</label>
        <input type="email" id="emailInput" class="form-input" placeholder="you@example.com" required>
      </div>

      <div class="form-group mb-6">
        <label class="form-label">PASSWORD</label>
        <input type="password" id="passwordInput" class="form-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary mb-4 w-full" id="loginBtn" style="width: 100%;">
        <i class="ph ph-sign-in"></i> Sign In
      </button>

      <div class="text-center text-sm text-secondary" style="text-align: center;">
        Don't have an account? <a href="signup.html" style="color: var(--accent-cyan); text-decoration: none;">Sign Up</a>
      </div>
    </form>
  </div>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Logic managed in main.js, this is just to hook specifically to the form if needed.
    });
  </script>
</body>
</html>
