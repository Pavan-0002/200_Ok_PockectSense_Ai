<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketSense AI - Profile</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .profile-header-banner {
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.15) 0%, rgba(181, 0, 255, 0.15) 100%);
            border-radius: var(--radius-lg);
            padding: 3rem 2rem;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 2rem;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 2rem;
        }
        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--accent-cyan), var(--accent-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: #fff;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
            border: 4px solid var(--surface);
            object-fit: cover;
            overflow: hidden;
        }
        .avatar-upload-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 36px;
            height: 36px;
            background: var(--accent-cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            border: 3px solid var(--surface);
            transition: var(--transition);
        }
        .avatar-upload-btn:hover { transform: scale(1.1); background: var(--accent-purple); }
        
        .profile-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 2rem; align-items: start; }
        .premium-input-group { position: relative; margin-bottom: 1.5rem; }
        .premium-input-group i.ph { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 1.2rem; pointer-events: none; }
        .premium-input { width: 100%; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-md); padding: 1rem 1rem 1rem 3rem; color: var(--text-primary); font-size: 1rem; transition: all 0.3s ease; }
        .premium-input:focus { outline: none; border-color: var(--accent-cyan); background: rgba(0, 229, 255, 0.05); }
        .premium-input-label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body>
  <div class="app-container">
    <header class="navbar">
      <div class="logo">
        <span class="text-gradient">PocketSense AI</span>
      </div>
      <nav class="nav-links">
        <a href="dashboard.html" class="nav-link">DASHBOARD</a>
        <a href="insights.html" class="nav-link">INSIGHTS</a>
        <a href="savings.html" class="nav-link">SAVINGS</a>
      </nav>
      <div class="nav-actions">
        <button class="btn-icon" aria-label="Notifications"><i class="ph ph-bell"></i></button>
        <button class="btn-icon" aria-label="Profile" onclick="window.location.href='profile.html'"><i class="ph ph-user-circle"></i></button>
      </div>
    </header>

    <main class="main-content">
      <div class="profile-header-banner">
          <div class="avatar-container">
              <img id="profileImageDisplay" class="profile-avatar" style="display: none;">
              <div id="profileAvatarPlaceholder" class="profile-avatar">
                  <i class="ph ph-user"></i>
              </div>
              <label for="avatarUploadInput" class="avatar-upload-btn">
                  <i class="ph ph-camera"></i>
              </label>
              <input type="file" id="avatarUploadInput" style="display: none;" accept="image/*">
          </div>
          <div>
              <p class="text-xs text-gradient mb-1" style="font-weight: 600; letter-spacing: 2px;">PRO TIER</p>
              <h1 class="text-4xl font-bold mb-2">User Profile</h1>
              <p class="text-secondary">Official PocketSense AI account configurations.</p>
          </div>
      </div>

      <div class="profile-grid">
          <div class="card p-8">
              <h2 class="text-xl font-semibold mb-6"><i class="ph ph-sliders"></i> Personal Details</h2>
              <form id="profileForm">
                  <div class="premium-input-group">
                      <label class="premium-input-label">Email Address</label>
                      <input type="email" id="profileEmail" class="premium-input" readonly style="opacity:0.6;">
                      <i class="ph ph-envelope"></i>
                  </div>
                  <div class="premium-input-group">
                      <label class="premium-input-label">Full Name</label>
                      <input type="text" id="profileName" class="premium-input" placeholder="Your Name">
                      <i class="ph ph-user"></i>
                  </div>
                  <div class="premium-input-group">
                      <label class="premium-input-label">Monthly Limit (₹)</label>
                      <input type="number" id="profileBudget" class="premium-input" placeholder="5000">
                      <i class="ph ph-wallet"></i>
                  </div>
                  <div class="premium-input-group">
                      <label class="premium-input-label">Savings Target (₹)</label>
                      <input type="number" id="profileSavings" class="premium-input" placeholder="20000">
                      <i class="ph ph-piggy-bank"></i>
                  </div>
                  <button type="submit" id="saveProfileBtn" class="btn btn-primary mt-4 py-3" style="width: 100%;">
                      <i class="ph ph-check-circle"></i> Update Profile
                  </button>
              </form>
          </div>

          <div style="display: flex; flex-direction: column; gap: 2rem;">
              <div class="card p-6" style="border-top: 3px solid var(--accent-purple);">
                  <h2 class="text-lg font-semibold mb-3"><i class="ph ph-medal text-warning"></i> Achievements</h2>
                  <div id="badgesContainer" style="display: flex; flex-direction: column; gap: 1rem;">
                      <div class="text-sm text-secondary">Loading badges...</div>
                  </div>
              </div>
              <button type="button" id="resetDataBtn" class="btn btn-outline" style="color: var(--accent-danger); border-color: var(--accent-danger);">
                  <i class="ph ph-trash"></i> Wipe All Data
              </button>
          </div>
      </div>
    </main>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
